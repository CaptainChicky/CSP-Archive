<html dir="ltr">

<head>
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
			user-select: none;
		}

		body {
			padding: 0 8px;
			overflow: hidden;
			font-family: 'Open Sans', sans-serif;
			display: flex;
			flex-direction: column;
			align-items: flex-end;
			justify-content: center;
		}

		/* === Notification Card === */

		.notification-card {
			position: relative;
			display: flex;
			overflow: hidden;
			width: 100%;
			margin: 8px 0;
			padding: 6px;
			border-radius: 12px;
			background-color: #fafafa;
			box-shadow: 0 3px 3px -2px rgba(0, 0, 0, .2),
				0 3px 4px 0 rgba(0, 0, 0, .14),
				0 1px 4px 0 rgba(0, 0, 0, .12);
			visibility: hidden;
			user-select: none;
			transform: translateX(100%);
		}

		.notification-card[contrast=dark] {
			background-color: #282c34;
			box-shadow: 0 3px 3px -2px hsla(0, 0%, 86.3%, .2),
				0 3px 4px 0 hsla(0, 0%, 86.3%, .14),
				0 1px 4px 0 hsla(0, 0%, 86.3%, .12);
		}

		.notification-card[contrast=dark] .text-content>div {
			color: #fff;
		}

		/* Slide-in/out animation states (toggled via JS) */

		.notification-card.visible {
			visibility: visible;
			transition: transform .3s ease-in;
			transform: translateX(0);
		}

		.slide-out-right {
			visibility: visible;
			transition: transform .3s ease-in;
			transform: translateX(110%);
		}

		.slide-out-left {
			visibility: visible;
			transition: transform .3s ease-in;
			transform: translateX(-110%);
		}

		/* Banner variant (rounded pill shape) */

		.notification-banner {
			margin: 3px 0;
			border-radius: 24px;
		}

		.notification-banner[contrast=colored] {
			background: transparent linear-gradient(90deg, #97eff6, #cca6ff) 0 0 no-repeat padding-box;
		}

		.notification-banner[contrast=default] {
			background-color: #e1e1e1;
		}

		/* === Card Layout === */

		.card-content {
			display: flex;
			flex-direction: column;
			width: 100%;
		}

		.card-body {
			display: flex;
			padding: 5px;
		}

		/* === Text Content === */

		.text-content {
			display: flex;
			flex-grow: 1;
			flex-direction: column;
			justify-content: center;
			overflow: hidden;
			margin: 0 4px 0 6px;
		}

		html[dir=rtl] .text-content {
			margin: 0 6px 0 4px;
		}

		.text-content>div {
			color: #222;
		}

		.title {
			font-size: 14px;
			line-height: 1.5;
		}

		.title-bold {
			font-weight: 700;
			font-size: 15px;
		}

		.subtitle {
			font-size: 12px;
			line-height: 1.2;
		}

		.subtitle-muted {
			font-size: 13px;
		}

		.notification-banner:not([contrast=dark]) .subtitle-muted {
			color: #686868;
		}

		/* === Icon === */

		.icon-wrapper {
			position: relative;
			flex: 0 0 18%;
			width: 18%;
			height: 0;
			padding-top: 18%;
		}

		@media screen and (min-width: 361px) {
			.icon-wrapper {
				flex: 0 0 15%;
				width: 15%;
				padding-top: 15%;
			}
		}

		.icon-image {
			position: absolute;
			top: 0;
			right: 0;
			bottom: 0;
			left: 0;
			object-fit: cover;
			width: 100%;
			height: 100%;
			border-radius: 2px;
		}

		.round {
			border-radius: 50%;
		}

		/* === Buttons === */

		.button-row {
			display: flex;
			justify-content: space-between;
			margin-top: 5px;
		}

		.button-row-flush {
			margin: 0 -6px -6px;
		}

		.button {
			width: 49%;
			padding: 7px;
			border-radius: 5px;
			text-align: center;
			text-transform: capitalize;
			cursor: pointer;
		}

		.button-primary {
			background-color: #2172e7;
			color: #fff;
		}

		.button-secondary {
			background-color: #fff;
			color: #2172e7;
		}

		.button-row-themed[contrast=dark] .button-secondary,
		.button-row-themed[contrast=light] .button-secondary {
			background-color: #e1e1e1;
		}

		.button-label {
			display: flex;
			align-items: center;
			justify-content: center;
			height: 40px;
			padding: 5px;
			background-color: inherit;
			color: #2172e7;
			font-weight: 700;
			font-size: 15px;
		}

		.align-start {
			text-align: start;
			width: 50%;
		}

		.align-end {
			text-align: end;
			width: 50%;
		}
	</style>
</head>

<body class="notranslate">
	<!-- "Damaged phone" scam notification -->
	<div class="notification-card notification-banner visible" data-role="on-page" contrast="colored">
		<div class="card-content">
			<div class="card-body">
				<div class="text-content">
					<div class="title title-bold"></div>
					<div class="subtitle subtitle-muted">Your iFone is severely damaged by <b><u>(4)</u></b> 😲</div>
				</div>
				<div class="icon-wrapper" data-role="icon-container">
					<img class="icon-image round" src="./media/settings-notification.png">
				</div>
			</div>
			<div class="button-row button-row-themed button-row-flush" contrast="colored">
				<div class="button button-primary button-label align-start">Click here to fix your iFone!</div>
				<div data-role="close" class="button button-secondary button-label align-end">×</div>
			</div>
		</div>
	</div>

	<!-- Fake gift card notification -->
	<div class="notification-card notification-banner visible" data-role="on-page" contrast="colored">
		<div class="card-content">
			<div class="card-body">
				<div class="text-content">
					<div class="title title-bold"><b>FREEE</b> Amazon Giftcard!</div>
				</div>
				<div class="icon-wrapper" data-role="icon-container">
					<img class="icon-image round" src="./media/amazon-gc.png">
				</div>
			</div>
			<div class="button-row button-row-themed button-row-flush" contrast="colored">
				<div class="button button-primary button-label align-start">Klaim here!</div>
				<div data-role="close" class="button button-secondary button-label align-end">×</div>
			</div>
		</div>
	</div>
</body>

</html>
