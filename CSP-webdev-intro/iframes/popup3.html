<html dir="ltr">

<head>
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
			user-select: none;
		}

		body {
			padding: 4px 12px;
			overflow: hidden;
			font-family: 'Open Sans', sans-serif;
			display: flex;
			flex-direction: column;
			align-items: flex-end;
			justify-content: center;
		}

		body>div:last-child {
			border-bottom: none;
		}

		/* === Notification Card === */

		.notification-card {
			position: relative;
			display: flex;
			overflow: hidden;
			width: 100%;
			margin: 8px 0;
			padding: 6px;
			border-radius: 12px;
			background-color: #fafafa;
			box-shadow: 0 3px 3px -2px rgba(0, 0, 0, .2),
				0 3px 4px 0 rgba(0, 0, 0, .14),
				0 1px 4px 0 rgba(0, 0, 0, .12);
			visibility: hidden;
			user-select: none;
			transform: translateX(100%);
		}

		.notification-card[contrast=dark] {
			background-color: #282c34;
			box-shadow: 0 3px 3px -2px hsla(0, 0%, 86.3%, .2),
				0 3px 4px 0 hsla(0, 0%, 86.3%, .14),
				0 1px 4px 0 hsla(0, 0%, 86.3%, .12);
		}

		.notification-card[contrast=dark] .text-content>div {
			color: #fff;
		}

		/* Slide-in/out animation states (toggled via JS) */

		.notification-card.visible {
			visibility: visible;
			transition: transform .3s ease-in;
			transform: translateX(0);
		}

		.slide-out-right {
			visibility: visible;
			transition: transform .3s ease-in;
			transform: translateX(110%);
		}

		.slide-out-left {
			visibility: visible;
			transition: transform .3s ease-in;
			transform: translateX(-110%);
		}

		/* Banner variant (rounded pill shape) */

		.notification-banner {
			margin: 3px 0 10px;
			border-radius: 24px;
		}

		.notification-banner[contrast=colored] {
			background: transparent linear-gradient(90deg, #97eff6, #cca6ff) 0 0 no-repeat padding-box;
		}

		.notification-banner[contrast=default] {
			background-color: #e1e1e1;
		}

		/* === Scam card theme overrides === */

		.notification-banner {
			background-color: #e91e63 !important;
			box-shadow: 0 3px 10px 4px rgba(233, 30, 99, 0.71) !important;
		}

		/* === Card Layout === */

		.card-content {
			display: flex;
			flex-direction: column;
			width: 100%;
		}

		.card-body {
			display: flex;
			padding: 5px;
		}

		/* === Text Content === */

		.text-content {
			display: flex;
			flex-grow: 1;
			flex-direction: column;
			justify-content: center;
			overflow: hidden;
			margin: 0 4px 0 6px;
		}

		html[dir=rtl] .text-content {
			margin: 0 6px 0 4px;
		}

		.text-content>div {
			color: #222;
		}

		.title {
			font-size: 14px;
			line-height: 1.5;
		}

		.title-bold {
			font-weight: 700;
			font-size: 15px;
			color: #fffefe !important;
		}

		.subtitle {
			font-size: 12px;
			line-height: 1.2;
		}

		.subtitle-muted {
			font-size: 13px;
			color: #f9f6f6 !important;
		}

		/* === Icon === */

		.icon-wrapper {
			position: relative;
			flex: 0 0 18%;
			width: 18%;
			height: 0;
			padding-top: 18%;
		}

		@media screen and (min-width: 361px) {
			.icon-wrapper {
				flex: 0 0 15%;
				width: 15%;
				padding-top: 15%;
			}
		}

		.icon-image {
			position: absolute;
			top: 0;
			right: 0;
			bottom: 0;
			left: 0;
			object-fit: cover;
			width: 100%;
			height: 100%;
			border-radius: 2px;
		}

		/* === Buttons === */

		.button-row {
			display: flex;
			justify-content: space-between;
			margin-top: 5px;
		}

		.button-row-styled>div {
			border-radius: 10px;
			font-weight: 700;
		}

		.button {
			width: 49%;
			padding: 7px;
			border-radius: 5px;
			text-align: center;
			cursor: pointer;
			font: inherit;
		}

		.button-primary {
			background-color: #009688 !important;
			color: #fbf8f8 !important;
		}

		.button-secondary {
			background-color: #e91e63 !important;
			color: #2172e7;
			border: 2px dotted #009688 !important;
			color: #fffdfd !important;
		}

		.button-row-themed[contrast=dark] .button-secondary,
		.button-row-themed[contrast=light] .button-secondary {
			background-color: #e1e1e1;
		}
	</style>
</head>
