<html dir="ltr">

<head>
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<style>
		/* shifts box to into the walls of the page lol might wanna change later */
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		body {
			display: flex;
			flex-direction: column;
			align-items: flex-end;
			justify-content: center;
		}

		.pulse-container {
			display: flex;
			align-items: center;
			justify-content: center;
			width: 140px;
			height: 140px;
		}

		.pulse-circle {
			position: relative;
			display: flex;
			align-items: center;
			justify-content: center;
			width: 70px;
			height: 70px;
			border-radius: 50%;
			background-color: #1da8f2;
			box-shadow: 0 0 3px 1px rgba(0, 0, 0, 0.25);
			user-select: none;
		}

		.pulse-circle::before,
		.pulse-circle::after {
			content: "";
			position: absolute;
			top: 0;
			left: 0;
			width: 100%;
			height: 100%;
			border: 1px solid #1da8f2;
			/* if you delete this it becomes a square wave lmao */
			border-radius: 50%;
		}

		.pulse-circle::before {
			animation: pulse-ring-inner 1.2s ease-out 0.2s infinite;
		}

		.pulse-circle::after {
			animation: pulse-ring-outer 1.2s ease-out infinite;
		}

		.circle-image {
			z-index: 1;
			/*
                IMPORTANT! Border radius determines how much of the image inside the blue circles
               is cut off. I set a low border radius because the moth is cute. A higher border
               radius would mean that more of the moth is cut off from a cirular cutoff that
               grows inwards in a circle as the border radius grows in percentage.
            */
			border-radius: 0%;
			cursor: pointer;
			transition: opacity 0.25s ease-in;
		}

		@keyframes pulse-ring-inner {
			0% {
				opacity: 0;
				transform: scale(0.3);
			}

			50% {
				opacity: 1;
			}

			100% {
				opacity: 0;
				transform: scale(1.5);
			}
		}

		@keyframes pulse-ring-outer {
			0% {
				opacity: 0;
				transform: scale(0.3);
			}

			50% {
				opacity: 1;
			}

			100% {
				opacity: 0;
				transform: scale(2);
			}
		}
	</style>
</head>

<body class="notranslate">
	<div class="pulse-container">
		<div class="pulse-circle">
			<img style="width: 90%; height: 90%;" src="./media/MothBabyJuniper.png" class="circle-image">
		</div>
	</div>
</body>

</html>
